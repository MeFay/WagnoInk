    <!-- ── JSON-LD — Local Business structured data ──────────────────────

         This is the single most impactful thing for local Google ranking.
         TODO: add the real street address / Maps URL once confirmed by client.
    ──────────────────────────────────────────────────────────────────── -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
      "@type": "TattooParlor",
      "@id": "https://wagnoink-three.vercel.app/",
      "name": "Wagno Ink",
      "description": "Tatuador em Porto especializado em anime, gaming, realismo e blackwork. Tattoo artist in Porto, Portugal.",

      "telephone": "+351910848391",

      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Rua de Santa Catarina",
        "addressLocality": "Rio Tinto",
        "addressRegion": "Porto",
        "addressCountry": "PT"
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday", "Tuesday", "Wednesday",
